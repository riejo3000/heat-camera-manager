      <tbody>${rows}</tbody>
    </table>
    <div class="mono" style="text-align:right;padding:9px 10px 0;font-weight:700;">Σ ${fmtTB(dayTotals(dayKey).gb)}</div>`;
}

/* ---------- PDF-Generierung (jsPDF) ---------- */
function pdfHeader(doc, subtitle){
  const W = doc.internal.pageSize.getWidth();
  doc.setFillColor(232,83,10); doc.rect(0, 0, W, 6, "F");           // Accent-Band
  doc.setFont("helvetica","bold"); doc.setFontSize(16); doc.setTextColor(232,83,10);
  doc.text("H.E.A.T.", 40, 42);
  const hw = doc.getTextWidth("H.E.A.T.");
  doc.setFont("helvetica","normal"); doc.setFontSize(11); doc.setTextColor(110,110,110);
  doc.text("— Kamera-Management", 40 + hw + 8, 42);
  doc.setFont("helvetica","bold"); doc.setFontSize(13); doc.setTextColor(17,17,17);
  doc.text(subtitle, 40, 66);
  doc.setDrawColor(229,229,229); doc.line(40, 80, W-40, 80);
  return 100;
}
function pdfFooters(doc){
  const W = doc.internal.pageSize.getWidth(), H = doc.internal.pageSize.getHeight();
  const n = doc.internal.getNumberOfPages();
  const stamp = "erstellt " + new Date().toLocaleString("de-DE");
  for(let i=1;i<=n;i++){
    doc.setPage(i);
    doc.setFont("helvetica","normal"); doc.setFontSize(8); doc.setTextColor(170,170,170);
    doc.text("H.E.A.T. Camera Manager · " + stamp, 40, H-26);
    doc.text("Seite " + i + " / " + n, W-40, H-26, { align:"right" });
  }
}
function exportPDF(){
  if(!(window.jspdf && window.jspdf.jsPDF)){ toast("PDF-Bibliothek nicht geladen"); return; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit:"pt", format:"a4" });
  const M = 40, W = doc.internal.pageSize.getWidth(), H = doc.internal.pageSize.getHeight();
  const meta = DAYS.find(d => d.key === Report.day);
  const dateStr = new Date().toLocaleDateString("de-DE", { weekday:"long", day:"numeric", month:"long", year:"numeric" });

  /* ---- Seite 1: Übersicht ---- */
  let y = pdfHeader(doc, "Tagesbericht — " + meta.full);
  doc.setFont("helvetica","normal"); doc.setFontSize(9); doc.setTextColor(120,120,120);
  doc.text(dateStr, M, y); y += 18;

  const rows = reportRows();
  const totPlanned = rows.reduce((s,r)=> s + r.plannedGB, 0);
  const totActual  = rows.reduce((s,r)=> s + r.actualGB, 0);

  const cols = [
    { x:M,      w:28  }, // ID
    { x:M+28,   w:96  }, // Kamera
    { x:M+124,  w:58  }, // Geplant
    { x:M+182,  w:128 }, // Einsatz
    { x:M+310,  w:58  }, // Laufzeit
    { x:M+368,  w:52  }, // Daten
    { x:M+420,  w:42  }, // Karten
    { x:M+462,  w:53  }, // Status
  ];
  const heads = ["ID","KAMERA","GEPLANT","EINSATZ","LAUFZEIT","DATEN","KARTEN","STATUS"];
  doc.setFont("helvetica","bold"); doc.setFontSize(8); doc.setTextColor(150,150,150);
  heads.forEach((h,i)=> doc.text(h, cols[i].x, y));
  y += 4; doc.setDrawColor(225,225,225); doc.line(M, y, W-M, y); y += 13;

  doc.setFontSize(9);
  if(!rows.length){
    doc.setTextColor(150,150,150); doc.text("Keine Kameras geplant oder aktiv.", M, y); y += 16;
  }
  rows.forEach(r => {
    const noteLines = doc.splitTextToSize(r.note || "—", cols[3].w - 4);
    const rowH = Math.max(14, noteLines.length * 10.5);
    doc.setFont("helvetica","bold"); doc.setTextColor(17,17,17); doc.text(r.cam.id, cols[0].x, y);
    doc.setFont("helvetica","normal");
    doc.text(doc.splitTextToSize(r.cam.name, cols[1].w - 4), cols[1].x, y);
    doc.text(r.planned ? pdfData(r.plannedGB) : "–", cols[2].x, y);
    doc.setTextColor(95,95,95); doc.text(noteLines, cols[3].x, y); doc.setTextColor(17,17,17);
    doc.text(r.runtimeMs ? fmtClock(r.runtimeMs) : "–", cols[4].x, y);
    doc.text(pdfData(r.actualGB), cols[5].x, y);
    doc.text(r.cards ? String(r.cards) : "–", cols[6].x, y);
    doc.text(statusLabel(r.status), cols[7].x, y);
    y += rowH + 7;
    doc.setDrawColor(238,238,238); doc.line(M, y-5, W-M, y-5);
  });
  y += 6;
  doc.setFont("helvetica","bold"); doc.setFontSize(10); doc.setTextColor(17,17,17);
  doc.text("Geplant gesamt:  " + pdfData(totPlanned), M, y);
  doc.text("Aufgenommen:  " + pdfData(totActual), M + 230, y);

  /* ---- Seite 2: Ereignis-Log ---- */
  doc.addPage(); y = pdfHeader(doc, "Ereignis-Log — " + meta.full);
  const ev = [...Report.shoot.events].sort((a,b)=> a.ts - b.ts);   // chronologisch
  doc.setFontSize(9);
  if(!ev.length){ doc.setTextColor(150,150,150); doc.text("Keine Ereignisse erfasst.", M, y); }
  ev.forEach(e => {
    if(y > H - 60){ doc.addPage(); y = pdfHeader(doc, "Ereignis-Log (Forts.)"); doc.setFontSize(9); }
    doc.setFont("helvetica","normal"); doc.setTextColor(120,120,120); doc.text(fmtTime(e.ts), M, y);
    doc.setFont("helvetica","bold"); doc.setTextColor(17,17,17); doc.text(e.camId || "—", M+62, y);
    const warn = (e.type === "warn75" || e.type === "warn90");
    doc.setFont("helvetica", warn ? "bold" : "normal");
    doc.setTextColor(warn ? 215 : 45, warn ? 38 : 45, warn ? 61 : 45);
    doc.text(doc.splitTextToSize(e.text, W - M - (M+100)), M+100, y);
    y += 16;
  });

  /* ---- Seite 3: Vorschau nächster Tag ---- */
  const idx = DAYS.findIndex(d => d.key === Report.day);
  const next = (idx >= 0 && idx < DAYS.length-1) ? DAYS[idx+1] : null;
  doc.addPage(); y = pdfHeader(doc, "Vorschau — " + (next ? next.full : "Drehende"));
  if(!next){
    doc.setFontSize(10); doc.setTextColor(150,150,150);
    doc.text("Letzter Drehtag der Woche — keine Vorschau.", M, y);
  } else {
    const planDay = Plan.week.days[next.key] || { cams:{} };
    const cams = State.cameras.filter(cam => { const e=(planDay.cams||{})[cam.id]; return e && e.on; });
    if(!cams.length){
      doc.setFontSize(10); doc.setTextColor(150,150,150);
      doc.text("Keine Planung für diesen Tag.", M, y);
    } else {
      const nh = ["ID","KAMERA","STD","DATEN","EINSATZ"];
      const nx = [M, M+30, M+150, M+185, M+250];
      doc.setFont("helvetica","bold"); doc.setFontSize(8); doc.setTextColor(150,150,150);
      nh.forEach((h,i)=> doc.text(h, nx[i], y));
      y += 4; doc.setDrawColor(225,225,225); doc.line(M, y, W-M, y); y += 13;
      doc.setFontSize(9); let tot = 0;
      cams.forEach(cam => {
        const e = planDay.cams[cam.id]; const gb = camDayData(cam, e).gb; tot += gb;
        const noteLines = doc.splitTextToSize(e.note || "—", W - M - (M+250));
        const rowH = Math.max(14, noteLines.length * 10.5);
        doc.setFont("helvetica","bold"); doc.setTextColor(17,17,17); doc.text(cam.id, nx[0], y);
        doc.setFont("helvetica","normal"); doc.text(doc.splitTextToSize(cam.name, 112), nx[1], y);
        doc.text(String(e.h || 0), nx[2], y);
        doc.text(pdfData(gb), nx[3], y);
        doc.setTextColor(95,95,95); doc.text(noteLines, nx[4], y); doc.setTextColor(17,17,17);
        y += rowH + 7; doc.setDrawColor(238,238,238); doc.line(M, y-5, W-M, y-5);
      });
      y += 6; doc.setFont("helvetica","bold"); doc.setFontSize(11);
      doc.text("Σ geplant:  " + pdfData(tot), M, y);
    }
  }

  pdfFooters(doc);

  /* ---- Ausgabe: Blob-URL (iPhone-kompatibel) ---- */
  try {
    const blob = doc.output("blob");
    const url  = URL.createObjectURL(blob);
    const win  = window.open(url, "_blank");
    if(!win){
      const a = document.createElement("a");
      a.href = url; a.download = "HEAT_Tagesbericht_" + Report.day + ".pdf";
      document.body.appendChild(a); a.click(); a.remove();
    }
    setTimeout(()=> URL.revokeObjectURL(url), 60000);
    toast("PDF erstellt");
  } catch(e){
    console.warn("PDF-Ausgabe fehlgeschlagen:", e);
    toast("PDF-Export fehlgeschlagen");
  }
}

/* ============================================================
   App-Start
   ============================================================ */
async function enterApp(){
  $("#auth-screen").style.display = "none";
  $("#app").classList.add("active");

  await loadCameras();
  await loadPlan();
  if(recomputeAllCameras()) await saveCameras();   // Format-Raten an Projekt-Bildrate angleichen
  await loadShoot(defaultShootDay());
  await loadReport(defaultShootDay());
  setView(State.currentView);
  SyncStatus.render();
  Push.registerSW();      // Service Worker früh registrieren (für Push)
}

async function init(){
  // Sync-Indikator im Header vorbereiten (wird in enterApp sichtbar)
  const titleWrap = document.querySelector(".app-header-inner");
  if(titleWrap && !document.getElementById("sync-dot")){
    const dot = document.createElement("span");
    dot.id = "sync-dot";
    dot.className = "sync-dot";
    dot.textContent = Store.cloud() ? "Cloud" : "Lokal";
    // rechts neben die Header-Aktion hängen
    $("#header-action").before(dot);
  }

  Auth.init();
  bindGlobalEvents();
  SyncStatus.render();

  if(await Auth.check()){
    await enterApp();
  } else {
    $("#auth-screen").style.display = "flex";
    setTimeout(()=> $("#auth-input").focus(), 200);
  }
}

document.addEventListener("DOMContentLoaded", init);
</script>
